instrument_type: "FUTURES"   # FUTURES or OPTIONS
underlying: "MES"            # MES, SPX, SPY, ES
strike_mode: "ATM"           # ATM, OTM_1, DELTA
expiration_mode: "WEEKLY"    # ZERO_DTE, WEEKLY, MONTHLY
premium_stop_pct: 0.35       # Exit if premium drops 35% (tighter to cut losers faster)
premium_trail_trigger_pct: 0.15  # Activate trail after 15% gain (was 20%)
premium_trail_drop_pct: 0.15     # Exit on 15% drop from peak
put_confidence_boost: 0.15       # Extra confidence required for PUT entries
expiration_guard_minutes: 15  # Auto-exit N min before close on exp day
quantity: 1
option_commission_per_side: 1.50
cash_settled_underlyings:
  - "SPX"
max_premium: 2.00            # Max premium per contract ($2.00 = $200 risk)
otm_fallback: true           # If ATM > max_premium, try OTM_1
